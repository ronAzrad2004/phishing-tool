<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Analysis Tool</title>
    <style>
        :root {
            --primary: #05998b;
            --danger: #d9534f;
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        h1 { 
            color: var(--primary); 
            margin-top: 0;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        .divider {
            height: 2px;
            width: 50px;
            background: var(--primary);
            margin: 1.5rem auto;
        }
        .input-group {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input[type="text"] {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #047a6f;
        }
        #statusMsg {
            margin-top: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="subtitle">Security Operations Center</span>
        <h1>Phishing Tool</h1>
        <div class="divider"></div>
        <p>Input URL for automated processing.</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com" required>
            <button id="analyzeBtn">Analyze URL</button>
        </div>

        <div id="statusMsg"></div>
    </div>

    <script>
        const btn = document.getElementById('analyzeBtn');
        const input = document.getElementById('urlInput');
        const status = document.getElementById('statusMsg');

        btn.addEventListener('click', async () => {
            const urlValue = input.value.trim();
            if (!urlValue) return;

            status.style.color = "var(--text)";
            status.innerText = "Processing request...";

            try {
                const response = await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlValue })
                });

                // Read the JSON only ONCE
                const data = await response.json();
                console.log(data);

                if (data.status === 200) {
                    status.style.color = "var(--primary)";
                    status.innerText = "✅ Request sent successfully.";
                    input.value = ""; 
                } else {
                    // Use the 'data' variable we already defined
                    status.style.color = "var(--danger)";
                    
                    // Check for the custom message you sent from Python OR a Pydantic error
                    const errorMsg = data.message || (data.detail && data.detail[0]?.msg) || "Invalid URL";
                    status.innerText = "❌ Error: " + errorMsg;
                }
            } catch (err) {
                console.error(err);
                status.style.color = "var(--danger)";
                status.innerText = "❌ Connection to backend failed.";
            }
        });
    </script>

</body>
</html>
